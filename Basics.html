<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Element</title>
</head>
<body>
    <script>
        let arr = [12,121,2,3,4,2,3,12];
        let i,j;

        for(i=0;i<arr.length;i++){
            for(j=1;j<i;j++){
                if(arr[i] == arr[j]){
                    console.log(arr[i]);
                }
            }
        }
    </script>
</body>
</html>
