<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe Button</title>
</head>

<body>
    <button class="yt-btn" onclick="sub()">
        Subscribe
    </button>
</body>
<script>
    function sub() {
        let btn = document.querySelector('.yt-btn');
        if (btn.innerText === 'Subscribe') {
            btn.innerHTML = 'Subscribed';
        }
        else {
            btn.innerHTML = 'Subscribe';
        }
    }
</script>

</html>
