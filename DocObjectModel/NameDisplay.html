<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Display</title>
</head>

<body>
    <input type="text" placeholder="Enter Your Name" class="js-name"
    onkeydown="keyControl()"
    >
    <button onclick="inputElement()">Enter</button>
    <p class="js-display"></p>
    <button onclick="Reset()">Reset</button>
</body>
<script>
    function inputElement() {
        let name = document.querySelector('.js-name').value;
        document.querySelector('.js-display').innerHTML =
        `Your Name is ${name}`;
    }
    function keyControl(){
        let key = event.key;
        if(key === 'Enter'){
            inputElement();
        }
    }
    function Reset(){
        document.querySelector('.js-name').value = '';
        document.querySelector('.js-display').innerHTML = '';
    }
</script>

</html>
