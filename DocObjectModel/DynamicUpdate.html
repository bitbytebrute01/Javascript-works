<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Update</title>
</head>
<body>
    <input type="text" placeholder="Enter Anything" class="js-input"
    onkeyup="
    let text = document.querySelector('.js-input').value;
    document.querySelector('.js-display')
    .innerHTML = text;
    ">
    <p class="js-display"></p>
</body>
    <script>
        
    </script>
</html>
