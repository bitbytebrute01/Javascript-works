<script>
    const object = {
        name : 'Aditya',
        age : 19,
        grade : 'A',
        rating: {
            name : 'ramesh',
            age : 46
        },
        fun : function calc(value1,value2){
            let sum = value1 + value2;
            return sum;
        }
    }
    console.log(JSON.stringify(object));
    console.log(object.fun(1,2));
    console.log(typeof console.log);
    console.log(JSON.stringify(object));
    </script>
