<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Coding</title>
</head>

<body>
    <button onclick="
            playerGame('Rock')
            ">Rock</button>
    <button onclick="
        playerGame('Paper')
        ">Paper</button>
    <button onclick="
        playerGame('Scissor')
        ">Scissor</button>

    <p class="result"></p>
    <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.Ties = 0;
        localStorage.removeItem('score');
        updateElement();
        ">Reset</button>
</body>
<script>
    let score = JSON.parse(localStorage.getItem('score'));
    if (score === null) {
        score = {
            wins: 0,
            losses: 0,
            Ties: 0
        }
    }
    updateElement();
    
    function playerGame(playerMove) {
        let computerMove = computerPick();
        let result = '';
        if (playerMove === computerMove) {
            result = 'Tie';
            score.Ties += 1;
        }
        else if(playerMove == 'Rock' && computerMove == 'Scissor' ||
            playerMove == 'Paper' && computerMove == 'Rock' ||
            playerMove == 'Scissor' && computerMove == 'Paper'
        ) {
            result = 'Win.';
            score.wins += 1;
        }
        else {
            result = 'Lose';
            score.losses += 1;
        }
        console.log(computerMove);
        updateElement();
        let scoreDisplay = document.querySelector('.result');
        scoreDisplay.innerHTML = `Wins : ${score.wins}, Losses : ${score.losses}, Ties : ${score.Ties}`;
        localStorage.setItem('score', JSON.stringify(score));
    }

    function updateElement() {
        document.querySelector('.result').innerHTML =
            `Wins : ${score.wins}. Losses : ${score.losses}, Ties : ${score.Ties}`;
    }

    function computerPick() {
        let computerMove = '';
        let randomNumber = Math.random();
        if (randomNumber > 0 && randomNumber < 1 / 3) {
            computerMove = 'Rock';
        }
        else if (randomNumber > 1 / 3 && randomNumber < 2 / 3) {
            computerMove = 'Paper';
        }
        else {
            computerMove = 'Scissor';
        }
        return computerMove;
    }
</script>

</html>
